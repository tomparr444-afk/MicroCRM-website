<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Micro CRM | Operations Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { BrandBlue: '#3b82f6', DarkBase: '#0f172a', Surface: '#1e293b', Border: '#334155' }
                }
            }
        }
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }
    </script>
</head>
<body class="text-slate-50 font-sans antialiased bg-DarkBase selection:bg-BrandBlue/30">
    
    <nav class="fixed w-full z-50 bg-Surface/90 backdrop-blur-lg border-b border-Border">
        <div class="max-w-7xl mx-auto px-4 h-16 md:h-20 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl">💼</span>
                <span class="font-bold text-lg md:text-2xl tracking-tight">Micro CRM</span>
            </div>
            
            <div class="hidden md:flex space-x-8 items-center text-sm font-medium text-slate-300">
                <a href="/features" class="hover:text-BrandBlue transition">Features</a>
                <a href="/pricing" class="hover:text-BrandBlue transition">Pricing</a>
                <a href="/app" class="bg-BrandBlue text-white px-6 py-2 rounded-md font-semibold">Login</a>
            </div>

            <button onclick="toggleMenu()" class="md:hidden p-2 text-slate-300">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </button>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-Surface border-b border-Border px-6 py-4 flex flex-col gap-4 text-center">
            <a href="/features" class="text-slate-300 py-2">Features</a>
            <a href="/pricing" class="text-slate-300 py-2">Pricing</a>
            <a href="/app" class="bg-BrandBlue text-white py-3 rounded-md font-bold">System Login</a>
        </div>
    </nav>

    <section class="relative pt-32 pb-20 md:pt-48 md:pb-32 px-4 text-center">
        <div class="inline-block mb-4 px-3 py-1 rounded-full border border-BrandBlue/30 bg-BrandBlue/10 text-blue-400 text-xs font-bold uppercase tracking-widest">
            KartaFlow v2.0
        </div>
        <h1 class="text-4xl md:text-7xl font-black tracking-tight mb-6 leading-tight">
            Dispatch. <span class="text-transparent bg-clip-text bg-gradient-to-r from-BrandBlue to-indigo-400">Route.</span> <br> Resolve.
        </h1>
        <p class="max-w-xl mx-auto text-base md:text-xl text-slate-400 mb-10 leading-relaxed">
            Lightweight command center for field operations. Live mapping and AI-driven enrichment.
        </p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center px-4">
            <a href="/app" class="bg-BrandBlue hover:bg-blue-500 text-white px-8 py-4 rounded-xl font-bold text-lg transition">
                Enter Command Center
            </a>
            <a href="/pricing" class="bg-Surface border border-Border text-white px-8 py-4 rounded-xl font-bold text-lg">
                View Pricing
            </a>
        </div>
    </section>

</body>
</html>
